name: Deploy Internal

on:
  push:
    branches:
      - develop
    paths-ignore:
      - "docs/**"
      - "*.md"

concurrency:
  group: internal-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-internal:
    name: Build and deploy to Play Internal
    runs-on: ubuntu-latest
    environment: internal-deploy
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN || vars.EXPO_TOKEN || '' }}
      PLAY_STORE_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON || vars.PLAY_STORE_SERVICE_ACCOUNT_JSON || '' }}
      PLAY_STORE_SERVICE_ACCOUNT_JSON_B64: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON_B64 || vars.PLAY_STORE_SERVICE_ACCOUNT_JSON_B64 || '' }}
    steps:
      - name: Workflow identity banner
        run: |
          set -euo pipefail
          echo "RUNNING INTERNAL DEPLOYMENT PIPELINE"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version-file: ".ruby-version"
          bundler-cache: true

      - name: Install dependencies
        run: npm ci

      - name: Validate Play credentials JSON
        run: |
          set -euo pipefail
          node -e "const raw=(process.env.PLAY_STORE_SERVICE_ACCOUNT_JSON||'').trim();const rawB64=(process.env.PLAY_STORE_SERVICE_ACCOUNT_JSON_B64||'').trim();if(!raw&&!rawB64){console.error('Missing Play credentials. Set PLAY_STORE_SERVICE_ACCOUNT_JSON or PLAY_STORE_SERVICE_ACCOUNT_JSON_B64 in environment secrets/variables.');process.exit(1)}let payload=raw;if(!payload&&rawB64){try{payload=Buffer.from(rawB64,'base64').toString('utf8')}catch(e){console.error('PLAY_STORE_SERVICE_ACCOUNT_JSON_B64 is not valid base64');process.exit(1)}}let parsed;try{parsed=JSON.parse(payload)}catch(e){console.error('Play credential payload is not valid JSON');process.exit(1)}const required=['type','project_id','client_email','private_key'];const missing=required.filter((key)=>!parsed[key]||String(parsed[key]).trim()==='');if(missing.length){console.error('Missing required Play credential fields: '+missing.join(', '));process.exit(1)}"

      - name: Setup Play Store credentials
        run: |
          set -euo pipefail
          echo "::group::Setup Play JSON"
          PLAY_PATH=$(bash scripts/setup-play-json.sh)
          echo "PLAY_STORE_JSON_KEY_PATH=$PLAY_PATH" >> "$GITHUB_ENV"
          echo "::endgroup::"
        env:
          PLAY_STORE_JSON_KEY_PATH: ${{ runner.temp }}/play-store-key.json

      - name: Build Android AAB with EAS
        run: |
          set -euo pipefail
          mkdir -p artifacts
          echo "::group::EAS build"
          BUILD_JSON=$(npx eas-cli build --platform android --profile staging --non-interactive --wait --json)
          printf '%s\n' "$BUILD_JSON" > artifacts/eas-build.json
          echo "::endgroup::"

          echo "::group::Parse EAS build id"
          BUILD_ID=$(node -e "const fs=require('fs');const p='artifacts/eas-build.json';const raw=fs.readFileSync(p,'utf8');let data;try{data=JSON.parse(raw);}catch(e){process.exit(2)}const id=(Array.isArray(data)?data[0]?.id:data?.id)||'';if(!id||id==='null'||id==='undefined'){process.exit(3)}process.stdout.write(String(id));")
          BUILD_URL=$(node -e "const fs=require('fs');const p='artifacts/eas-build.json';const raw=fs.readFileSync(p,'utf8');let data;try{data=JSON.parse(raw);}catch(e){process.exit(2)}const url=(Array.isArray(data)?data[0]?.artifacts?.buildUrl:data?.artifacts?.buildUrl)||'';if(!url||url==='null'||url==='undefined'){process.exit(3)}process.stdout.write(String(url));")
          if [ -z "${BUILD_ID}" ]; then
            echo "Failed to parse EAS build id from EAS JSON output"
            exit 1
          fi
          if [ -z "${BUILD_URL}" ]; then
            echo "Failed to parse EAS artifact URL from EAS JSON output"
            exit 1
          fi
          echo "EAS_BUILD_ID=${BUILD_ID}" >> "$GITHUB_ENV"
          echo "EAS_BUILD_ARTIFACT_URL=${BUILD_URL}" >> "$GITHUB_ENV"
          echo "::endgroup::"
        env:
          CI: "true"

      - name: Download deterministic AAB artifact
        run: |
          set -euo pipefail
          echo "::group::Download AAB"
          curl -fL "${EAS_BUILD_ARTIFACT_URL}" -o artifacts/app-internal.aab
          echo "::endgroup::"
      - name: Verify AAB artifact integrity
        run: |
          set -euo pipefail
          ARTIFACT_PATH="artifacts/app-internal.aab"
          echo "Artifact path: ${ARTIFACT_PATH}"
          ls -lah artifacts
          if [ ! -f "${ARTIFACT_PATH}" ]; then
            echo "Missing AAB artifact at ${ARTIFACT_PATH}"
            exit 1
          fi
          if [ ! -s "${ARTIFACT_PATH}" ]; then
            echo "AAB artifact is empty at ${ARTIFACT_PATH}"
            exit 1
          fi
          stat -c "Artifact size (bytes): %s" "${ARTIFACT_PATH}"

      - name: Upload AAB to Play Internal
        run: |
          set -euo pipefail
          echo "::group::Fastlane upload"
          bundle exec fastlane android deploy_internal aab_path:"artifacts/app-internal.aab" 2>&1 | tee artifacts/fastlane-upload.log
          node -e "const fs=require('fs');const log=fs.readFileSync('artifacts/fastlane-upload.log','utf8');if(!log.includes('UPLOAD_COMPLETED')){console.error('UPLOAD_COMPLETED marker missing from Fastlane logs');process.exit(1)}"
          echo "PLAY_UPLOAD_STATUS=PLAY_UPLOAD_COMPLETED" >> "$GITHUB_ENV"
          echo "::endgroup::"
        env:
          PLAY_STORE_JSON_KEY_PATH: ${{ env.PLAY_STORE_JSON_KEY_PATH }}
          CI: "true"

      - name: Final deployment summary
        run: |
          set -euo pipefail
          echo "PACKAGE: com.nayft.app"
          echo "TRACK: internal"
          echo "ARTIFACT: artifacts/app-internal.aab"
          echo "WORKFLOW: ${{ github.workflow }}"
          echo "STATUS: ${PLAY_UPLOAD_STATUS:-PLAY_UPLOAD_NOT_COMPLETED}"
