name: Deploy Internal

on:
  push:
    branches:
      - develop
      - main
    paths-ignore:
      - "docs/**"
      - "*.md"
  workflow_dispatch:

concurrency:
  group: internal-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-internal:
    name: Build and deploy to Play Internal
    runs-on: ubuntu-latest
    environment: internal-deploy
    env:
      PLAY_STORE_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON || vars.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Workflow identity banner
        run: |
          set -euo pipefail
          echo "RUNNING INTERNAL DEPLOYMENT PIPELINE"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version-file: ".ruby-version"
          bundler-cache: true

      - name: Install dependencies
        run: npm ci

      - name: Verify Expo account and project access
        run: |
          set -euo pipefail
          if [ -z "${EXPO_TOKEN:-}" ]; then
            echo "EXPO_TOKEN is required in the internal-deploy environment"
            exit 1
          fi
          echo "Expo account:"
          npx eas-cli whoami
          echo "EAS project:"
          npx eas-cli project:info

      - name: Validate Play credentials JSON
        run: |
          set -euo pipefail
          node -e "const raw=process.env.PLAY_STORE_SERVICE_ACCOUNT_JSON||'';if(!raw.trim()){console.error('PLAY_STORE_SERVICE_ACCOUNT_JSON is required (set as a secret or variable in the internal-deploy environment)');process.exit(1)}let parsed;try{parsed=JSON.parse(raw)}catch(e){console.error('PLAY_STORE_SERVICE_ACCOUNT_JSON is not valid JSON');process.exit(1)}const required=['type','project_id','client_email','private_key'];const missing=required.filter((key)=>!parsed[key]||String(parsed[key]).trim()==='');if(missing.length){console.error('Missing required Play credential fields: '+missing.join(', '));process.exit(1)}"

      - name: Setup Play Store credentials
        run: |
          set -euo pipefail
          echo "::group::Setup Play JSON"
          PLAY_PATH=$(bash scripts/setup-play-json.sh)
          echo "PLAY_STORE_JSON_KEY_PATH=$PLAY_PATH" >> "$GITHUB_ENV"
          echo "::endgroup::"
        env:
          PLAY_STORE_JSON_KEY_PATH: ${{ runner.temp }}/play-store-key.json

      - name: Resolve, build, or reuse Android AAB with EAS
        run: |
          set -euo pipefail
          mkdir -p artifacts
          bash scripts/prepare-android-deploy.sh staging internal artifacts/eas-build.json artifacts/app-internal.aab
        env:
          CI: "true"

      - name: Verify AAB artifact integrity
        if: env.DEPLOY_SKIPPED != 'true'
        run: |
          set -euo pipefail
          ARTIFACT_PATH="artifacts/app-internal.aab"
          echo "Artifact path: ${ARTIFACT_PATH}"
          ls -lah artifacts
          if [ ! -f "${ARTIFACT_PATH}" ]; then
            echo "Missing AAB artifact at ${ARTIFACT_PATH}"
            exit 1
          fi
          if [ ! -s "${ARTIFACT_PATH}" ]; then
            echo "AAB artifact is empty at ${ARTIFACT_PATH}"
            exit 1
          fi
          stat -c "Artifact size (bytes): %s" "${ARTIFACT_PATH}"

      - name: Upload AAB to Play Internal
        if: env.DEPLOY_SKIPPED != 'true'
        run: |
          set -euo pipefail
          if bash scripts/check-play-deployed.sh internal; then
            echo "PLAY_UPLOAD_STATUS=PLAY_UPLOAD_SKIPPED_ALREADY_DEPLOYED" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "::group::Fastlane upload"
          bundle exec fastlane android deploy_internal aab_path:"artifacts/app-internal.aab" 2>&1 | tee artifacts/fastlane-upload.log
          node -e "const fs=require('fs');const log=fs.readFileSync('artifacts/fastlane-upload.log','utf8');if(!/UPLOAD_COMPLETED|UPLOAD_SKIPPED_ALREADY_DEPLOYED/.test(log)){console.error('Upload success marker missing from Fastlane logs');process.exit(1)}"
          if grep -q 'UPLOAD_SKIPPED_ALREADY_DEPLOYED' artifacts/fastlane-upload.log; then
            echo "PLAY_UPLOAD_STATUS=PLAY_UPLOAD_SKIPPED_ALREADY_DEPLOYED" >> "$GITHUB_ENV"
          else
            echo "PLAY_UPLOAD_STATUS=PLAY_UPLOAD_COMPLETED" >> "$GITHUB_ENV"
          fi
          echo "::endgroup::"
        env:
          PLAY_STORE_JSON_KEY_PATH: ${{ env.PLAY_STORE_JSON_KEY_PATH }}
          CI: "true"

      - name: Final deployment summary
        run: |
          set -euo pipefail
          echo "PACKAGE: com.nayft.app"
          echo "TRACK: internal"
          echo "ARTIFACT: artifacts/app-internal.aab"
          echo "EAS_BUILD_ID: ${EAS_BUILD_ID:-unknown}"
          echo "EAS_BUILD_REUSED: ${EAS_BUILD_REUSED:-unknown}"
          echo "DEPLOY_SKIPPED: ${DEPLOY_SKIPPED:-false}"
          echo "WORKFLOW: ${{ github.workflow }}"
          echo "STATUS: ${PLAY_UPLOAD_STATUS:-PLAY_UPLOAD_NOT_COMPLETED}"
