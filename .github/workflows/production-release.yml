name: Production Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        type: string
      rollout_percentage:
        description: 'Staged rollout fraction (0.01 = 1%)'
        required: false
        default: '0.01'
        type: string
      track:
        description: 'Play track'
        required: false
        default: 'production'
        type: choice
        options:
          - production
          - beta
          - internal
      allow_prerelease:
        description: 'Allow prerelease tags (-beta, -rc)'
        required: false
        default: false
        type: boolean
      resume_from:
        description: 'Resume from existing AAB artifact (skip download if local)'
        required: false
        default: 'deploy'
        type: choice
        options:
          - deploy
          - full

concurrency:
  group: production-release-${{ inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production-release
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version-file: '.ruby-version'
          bundler-cache: true

      - name: Validate version tag
        run: node scripts/validate-version-tag.js "${{ inputs.tag }}"
        env:
          REJECT_PRERELEASE: ${{ inputs.allow_prerelease && 'false' || 'true' }}

      - name: Install Node dependencies
        run: npm ci

      - name: Setup Play Store JSON
        run: |
          PLAY_PATH=$(bash scripts/setup-play-json.sh)
          echo "PLAY_STORE_JSON_KEY_PATH=$PLAY_PATH" >> "$GITHUB_ENV"
        env:
          PLAY_STORE_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}

      - name: Download release AAB
        if: inputs.resume_from == 'full'
        run: |
          gh release download "${{ inputs.tag }}" --pattern '*.aab' --dir artifacts
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Download release AAB from manifest
        if: inputs.resume_from == 'deploy'
        run: |
          mkdir -p artifacts
          gh release download "${{ inputs.tag }}" --pattern '*.aab' --dir artifacts || \
          gh release download "${{ inputs.tag }}" --pattern 'release-manifest.json' --dir artifacts
          if ! ls artifacts/*.aab 1>/dev/null 2>&1; then
            echo "No AAB on release — run release.yml first or use resume_from=full after build"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Deploy to Play Store
        run: |
          AAB=$(ls -1 artifacts/*.aab | head -1)
          if [ "${{ inputs.track }}" = "production" ]; then
            bundle exec fastlane android deploy_production aab_path:"$AAB" rollout:"${{ inputs.rollout_percentage }}"
          elif [ "${{ inputs.track }}" = "beta" ]; then
            bundle exec fastlane android deploy_beta aab_path:"$AAB" rollout:"${{ inputs.rollout_percentage }}"
          else
            bundle exec fastlane android deploy_internal aab_path:"$AAB" skip_upload_metadata:true
          fi
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          PLAY_STORE_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          PLAY_STORE_JSON_KEY_PATH: ${{ env.PLAY_STORE_JSON_KEY_PATH }}
          CI: 'true'
          PLAY_TRACK: ${{ inputs.track }}

      - name: Update release manifest
        run: |
          AAB=$(ls -1 artifacts/*.aab | head -1)
          node scripts/write-release-manifest.js "$AAB"
        env:
          PLAY_TRACK: ${{ inputs.track }}
          GITHUB_REF_NAME: ${{ inputs.tag }}

      - name: Notify on failure
        if: failure() && vars.SLACK_WEBHOOK_URL != ''
        run: |
          curl -sf -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"Production release failed for ${{ inputs.tag }}: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "${{ vars.SLACK_WEBHOOK_URL }}"
        continue-on-error: true
