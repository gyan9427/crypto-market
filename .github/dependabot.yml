version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    # Expo SDK 56 pins react-native 0.85.x — use `npx expo install` for native deps, not Dependabot groups.
    ignore:
      - dependency-name: 'react-native'
        update-types: ['version-update:semver-major', 'version-update:semver-minor']
      - dependency-name: 'react-native-gesture-handler'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react-native-reanimated'
        update-types: ['version-update:semver-major', 'version-update:semver-minor']
      - dependency-name: 'react-native-screens'
        update-types: ['version-update:semver-major', 'version-update:semver-minor']
      - dependency-name: 'react-native-safe-area-context'
        update-types: ['version-update:semver-major', 'version-update:semver-minor']
      - dependency-name: 'react-native-svg'
        update-types: ['version-update:semver-major', 'version-update:semver-minor']
      - dependency-name: 'react-native-webview'
        update-types: ['version-update:semver-major', 'version-update:semver-minor']
      - dependency-name: 'react-native-web'
        update-types: ['version-update:semver-major', 'version-update:semver-minor']
      - dependency-name: 'react-native-url-polyfill'
        update-types: ['version-update:semver-major']
    groups:
      expo-ecosystem:
        patterns:
          - 'expo'
          - 'expo-*'
          - '@expo/*'
      testing:
        patterns:
          - 'vitest'
          - '@vitest/*'
      dev-tooling:
        dependency-type: development
        update-types:
          - patch
          - minor

  - package-ecosystem: bundler
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 2

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
